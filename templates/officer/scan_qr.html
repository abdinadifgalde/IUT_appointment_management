{% extends "layout.html" %}
{% block styles %}
<style>
#qr-reader { width: 100%; max-width: 440px; margin: 0 auto; border-radius: 12px; overflow: hidden; }
#result-box { display:none; }
</style>
{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow">
      <div class="card-header bg-info text-white text-center">
        <h5 class="mb-0"><i class="fas fa-qrcode me-2"></i>QR Code Scanner — Check-in</h5>
        <small>Scan student's appointment QR to verify and complete check-in</small>
      </div>
      <div class="card-body text-center">
        <div id="qr-reader"></div>
        <div class="mt-3">
          <p class="text-muted small">Or paste QR data manually:</p>
          <div class="input-group">
            <input type="text" id="manual-input" class="form-control" placeholder="APT-123-token...">
            <button class="btn btn-info text-white" onclick="submitQR(document.getElementById('manual-input').value)">Check In</button>
          </div>
        </div>
      </div>
    </div>

    <div id="result-box" class="card mt-3">
      <div class="card-body text-center" id="result-content"></div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script>
const csrfToken = "{{ csrf_token() }}";
let scanning = false;

function showResult(success, html) {
  const box = document.getElementById('result-box');
  const content = document.getElementById('result-content');
  box.style.display = 'block';
  box.className = 'card mt-3 border-' + (success ? 'success' : 'danger');
  content.innerHTML = html;
}

function submitQR(qrData) {
  if (!qrData.trim()) return;
  fetch('{{ url_for("officer.checkin") }}', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'X-CSRFToken': csrfToken },
    body: 'qr_data=' + encodeURIComponent(qrData) + '&csrf_token=' + encodeURIComponent(csrfToken),
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      const apt = data.appointment;
      showResult(true, `
        <div class="text-success mb-2"><i class="fas fa-check-circle fa-3x"></i></div>
        <h5 class="text-success">Check-in Successful!</h5>
        <p class="fw-bold">${apt.student}</p>
        <p class="text-muted small">Appt #${apt.id} · ${apt.date} · ${apt.time}</p>
        <p class="small">${apt.issue}</p>
        <span class="badge bg-success">Marked as Completed</span>
      `);
    } else {
      showResult(false, `
        <div class="text-danger mb-2"><i class="fas fa-times-circle fa-3x"></i></div>
        <h5 class="text-danger">Check-in Failed</h5>
        <p class="text-muted">${data.error}</p>
      `);
    }
  })
  .catch(() => showResult(false, '<p class="text-danger">Network error. Try again.</p>'));
}

// Start camera scanner
const html5QrCode = new Html5Qrcode("qr-reader");
html5QrCode.start(
  { facingMode: "environment" },
  { fps: 10, qrbox: { width: 280, height: 280 } },
  (decodedText) => {
    if (!scanning) {
      scanning = true;
      submitQR(decodedText);
      setTimeout(() => { scanning = false; }, 3000);
    }
  },
  (err) => {}
).catch(err => {
  document.getElementById('qr-reader').innerHTML = '<p class="text-muted p-4">Camera not available. Use manual input above.</p>';
});
</script>
{% endblock %}
